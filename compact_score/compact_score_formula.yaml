# Compact pathway-level risk score formula (5 cancers)
# ------------------------------------------------------
# linear_predictor = sum(beta_i * feature_i)
# risk_score       = exp(linear_predictor)   # = partial hazard
# A sample is "high risk" if risk_score > msk_partial_hazard_cutoff
#
# Feature definitions (per pathway P, gene-set G_P, sample s):
#   PW_<P>_amp_hit  = 1 if any gene in G_P has CNA >= +2 in s, else 0
#   PW_<P>_del_hit  = 1 if any gene in G_P has CNA <= -2 in s, else 0
#   PW_<P>_sv_hit   = 1 if any gene in G_P has structural variant in s, else 0
#   PW_<P>_mut_rate_raw = |{nonsilent-mutated genes in G_P in s}| / |G_P_covered|
#   PW_<P>_any_rate_raw = |{mut or amp or del genes in G_P in s}| / |G_P_covered|
#   PW_<P>_mut_rate_z = (PW_<P>_mut_rate_raw - mu) / sigma     # mu/sigma from MSK cohort, see zscore_params CSV
#   PW_<P>_any_rate_z = (PW_<P>_any_rate_raw - mu) / sigma     # idem
#   PW_<P>_zsum       = amp_hit + del_hit + sv_hit + mut_rate_z
# PW_HIT_COUNT(s) = number of pathways P in hit_count_pathways[cancer] such that
#                   (mut_rate_raw > 0) OR amp_hit OR del_hit in s   (0..K, K=len(list))
#
# Nonsilent variant classes (Variant_Classification in MAF):
#   Missense_Mutation, Nonsense_Mutation, Frame_Shift_Ins, Frame_Shift_Del,
#   In_Frame_Ins, In_Frame_Del, Splice_Site, Translation_Start_Site,
#   Nonstop_Mutation, Splice_Region
#
# Pathway gene sets follow the TCGA 10-pathway list (Sanchez-Vega et al, Cell 2018),
# augmented with internal DDR and Chromatin definitions (see build_3flag_enhanced.py).
#
# Per-cancer z-score (mu, sigma) parameters: external_validation/zscore_params/<cancer>_zscore_params.csv

cancers:
  BRCA:
    hit_count_pathways: [TP53, PI3K, RTK_RAS, Cell_Cycle, Chromatin, DDR, MYC]
    features:
      - {name: PW_HIT_COUNT,           beta:  0.1287982419490632}
      - {name: PW_TP53_mut_rate_z,     beta:  0.19105694078532443}
      - {name: PW_Cell_Cycle_sv_hit,   beta: -0.17794528890291722}
      - {name: PW_Chromatin_zsum,      beta: -0.03768679137824116}
      - {name: PW_RTK_RAS_amp_hit,     beta: -0.07489920218302375}
    msk_partial_hazard_cutoff: 0.985345270579853
    msk_train_cindex: null
    notes: >
      Trained on MSK-CHORD Breast Invasive Ductal Carcinoma (n_train events ≈ TODO).
      Cutoff = optimized threshold on training set; HR(high vs low) reported in Table X.

  LUAD:
    hit_count_pathways: [TP53, PI3K, RTK_RAS, Cell_Cycle, Chromatin, DDR, MYC, NOTCH, NRF2]
    features:
      - {name: PW_HIT_COUNT,           beta:  0.08623152852858001}
      - {name: PW_TP53_any_rate_z,     beta:  0.10802577709803124}
      - {name: PW_NOTCH_any_rate_z,    beta: -0.07991265465222017}
      - {name: PW_NRF2_zsum,           beta:  0.11153169994040811}
      - {name: PW_RTK_RAS_mut_rate_z,  beta: -0.07770157107125727}
    msk_partial_hazard_cutoff: 0.9800001499102232

  PAAD:
    hit_count_pathways: [TP53, RTK_RAS, Cell_Cycle, Chromatin, TGF_Beta, MYC, NOTCH, HIPPO]
    features:
      - {name: PW_HIT_COUNT,             beta:  0.06920342988949085}
      - {name: PW_RTK_RAS_amp_hit,       beta:  0.2549434141016316}
      - {name: PW_TP53_mut_rate_z,       beta:  0.05478694862514556}
      - {name: PW_TGF_Beta_any_rate_z,   beta: -0.020956985010307367}
      - {name: PW_MYC_any_rate_z,        beta:  0.060290969966127136}
    msk_partial_hazard_cutoff: 0.9711631065500346

  PRAD:
    hit_count_pathways: [TP53, PI3K, Cell_Cycle, Chromatin, DDR, WNT]
    features:
      - {name: PW_HIT_COUNT,             beta:  0.170726413463327}
      - {name: PW_Chromatin_sv_hit,      beta:  0.35349051682934207}
      - {name: PW_Cell_Cycle_zsum,       beta:  0.03694751393294625}
      - {name: PW_WNT_zsum,              beta: -0.041635671744958185}
    msk_partial_hazard_cutoff: 0.943476160003303

  CRC:
    hit_count_pathways: [TP53, RTK_RAS, WNT, TGF_Beta, PI3K, DDR, MYC, Chromatin]
    features:
      - {name: PW_HIT_COUNT,              beta:  0.0017846181549948435}
      - {name: PW_DDR_zsum,               beta: -0.11581336686061387}
      - {name: PW_RTK_RAS_any_rate_z,     beta:  0.036118379303230565}
      - {name: PW_TGF_Beta_amp_hit,       beta:  0.7813980789578783}
      - {name: PW_Chromatin_any_rate_z,   beta: -0.17962509718283623}
    msk_partial_hazard_cutoff: 1.0786901029340799
